version: '3.8'

services:
  onyx:
    build: .
    container_name: onyx-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - ./database.sqlite:/app/database.sqlite
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/gems', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: onyx-network